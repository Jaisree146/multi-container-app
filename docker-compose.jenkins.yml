services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - "JAVA_OPTS=-Xmx512m -Xms256m -Djenkins.install.runSetupWizard=false"
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always

volumes:
  jenkins_home:
